        409:
          description: Cannot delete — attraction types are still assigned to this category

  /api/attraction-categories/seed-from-types:
    post:
      summary: Migrate embedded category data to AttractionCategory documents (admin only, one-time)
      tags: [Attraction Categories]
      security:
        - BearerAuth: []
      responses:
        200:
          description: Migration result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  categories:
                    type: integer
                    description: Number of categories created or found
                  migrated:
                    type: integer
                    description: Number of attraction types updated with a categoryId
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only

