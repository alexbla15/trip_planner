      responses:
        201:
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttractionCategory'
        400:
          description: Validation error or duplicate name
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only

  /api/attraction-categories/{id}:
    put:
      summary: Update an attraction category (admin only)
      tags: [Attraction Categories]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionCategoryInput'
      responses:
        200:
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttractionCategory'
        400:
          description: Validation error or duplicate name
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only
        404:
          description: Category not found
    delete:
      summary: Delete an attraction category (admin only)
      tags: [Attraction Categories]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
