openapi: 3.0.0
info:
  title: Trip & Attraction Planner API
  version: 1.0.0
  description: API documentation for the Trip Management and Attraction Tracking Platform.
servers:
  - url: http://localhost:5000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token to access protected endpoints.

  schemas:
    # --- USER SCHEMAS ---
    UserRegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: SecureP@ss123

    UserLoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: SecureP@ss123

    UserProfile:
      type: object
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        avatarUrl:
          type: string
          example: https://example.com
        createdAt:
          type: string
          format: date-time

    UserUpdateInput:
      type: object
      properties:
        name:
          type: string
          example: John Smith
        avatarUrl:
          type: string
          example: https://example.com

    # --- TRIP SCHEMAS ---
    TripCollaborator:
      type: object
      properties:
        userId:
          type: string
          example: 65f1234567890abcdef12345
        email:
          type: string
          format: email
          example: jane@example.com
        name:
          type: string
          example: Jane Smith

    Trip:
      type: object
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef123aa
        ownerId:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: Summer in Rome
        cities:
          type: array
          nullable: true
          items:
            type: string
          example: ["Rome", "Florence"]
        country:
          type: string
          example: Italy
        coverImage:
          type: string
          example: https://example.com
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        budget:
          type: number
          example: 2500
        currency:
          type: string
          example: EUR
        moods:
          type: array
          items:
            type: string
          example: ["Adventure", "Food & Wine"]
        notes:
          type: string
          example: Don't forget to book the Colosseum tickets in advance.
        attractionIds:
          type: array
          items:
            type: string
          example: ["65f1234567890abcdef123bb"]
        collaborators:
          type: array
          description: Users invited by the owner to co-edit this trip.
          items:
            $ref: '#/components/schemas/TripCollaborator'
        isPrivate:
          type: boolean
          default: false
          description: When true, the trip is visible only to the owner and collaborators.
        calDayStart:
          type: integer
          minimum: 0
          maximum: 23
          description: First hour shown in the calendar day view (0–23). Persisted per trip.
        calDayEnd:
          type: integer
          minimum: 1
          maximum: 24
          description: Last hour shown in the calendar day view (1–24, must be > calDayStart).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripInput:
      type: object
      required:
        - name
        - country
        - startDate
        - endDate
      properties:
        name:
          type: string
          example: Summer in Rome
        cities:
          type: array
          nullable: true
          items:
            type: string
        country:
          type: string
          example: Italy
        coverImage:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        currency:
          type: string
        moods:
          type: array
          items:
            type: string
        notes:
          type: string
        isPrivate:
          type: boolean
          description: Set to true to restrict visibility to owner and collaborators only.
        calDayStart:
          type: integer
          minimum: 0
          maximum: 23
          description: First hour shown in the calendar day view.
        calDayEnd:
          type: integer
          minimum: 1
          maximum: 24
          description: Last hour shown in the calendar day view (must be > calDayStart).

    # --- ATTRACTION SCHEMAS ---
    OpeningHoursDay:
      type: object
      properties:
        closed:
          type: boolean
        open:
          type: string
          example: "09:00"
        close:
          type: string
          example: "18:00"

    # Trip-specific scheduling for one attraction
    AttractionSchedule:
      type: object
      properties:
        plannedDate:
          type: string
          format: date
          nullable: true
          description: Day the user plans to visit (stored in Trip.schedules, not on Attraction)
        plannedTime:
          type: string
          nullable: true
          description: HH:MM start time within plannedDate
        actualDurationValue:
          type: string
          nullable: true
        actualDurationUnit:
          type: string
          enum: [minutes, hours]
          nullable: true

    Attraction:
      type: object
      description: >
        Global shared entity — not owned by any single trip.
        Scheduling fields (plannedDate, plannedTime, actualDuration) come from
        Trip.schedules and are merged into the response by GET /api/trips/:id/attractions.
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef123bb
        ownerId:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: Colosseum
        country:
          type: string
          example: Italy
        city:
          type: string
          example: Rome
        coordinates:
          type: object
          nullable: true
          properties:
            lat:
              type: number
              example: 41.8902
            lng:
              type: number
              example: 12.4922
        types:
          type: array
          items:
            type: string
          example: ["Museum", "Historical Site"]
        durationValue:
          type: string
          example: "2"
        durationUnit:
          type: string
          enum: [minutes, hours]
          example: hours
        price:
          type: number
          nullable: true
          example: 16.00
        currency:
          type: string
          default: USD
          description: ISO 4217 currency code for the price field.
          example: EUR
        openingHours:
          type: object
          properties:
            Mon: { $ref: '#/components/schemas/OpeningHoursDay' }
            Tue: { $ref: '#/components/schemas/OpeningHoursDay' }
            Wed: { $ref: '#/components/schemas/OpeningHoursDay' }
            Thu: { $ref: '#/components/schemas/OpeningHoursDay' }
            Fri: { $ref: '#/components/schemas/OpeningHoursDay' }
            Sat: { $ref: '#/components/schemas/OpeningHoursDay' }
            Sun: { $ref: '#/components/schemas/OpeningHoursDay' }
        notes:
          type: string
          nullable: true
          example: Book tickets in advance.
        photoUrl:
          type: string
          nullable: true
          example: https://example.com/photo.jpg
        plannedDate:
          type: string
          nullable: true
          description: ISO date the traveler plans to visit (YYYY-MM-DD), set by the calendar wizard.
          example: "2025-07-15"
        plannedTime:
          type: string
          nullable: true
          description: Start time within plannedDate (HH:MM), e.g. 09:30.
          example: "09:30"
        actualDurationValue:
          type: string
          nullable: true
          description: Traveler's planned duration (distinct from the recommended durationValue).
          example: "2.5"
        actualDurationUnit:
          type: string
          nullable: true
          enum: [minutes, hours]
          example: hours
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        # --- Subtype discriminator ---
        subtype:
          type: string
          nullable: true
          enum: [residence, flight, custom-slot]
          description: Distinguishes special attraction types from generic ones. Absent for regular attractions.
        # --- Residence-specific fields (present when subtype = "residence") ---
        residenceType:
          type: string
          nullable: true
          enum: [Hotel, Apartment, Hostel, Villa, Other]
          example: Hotel
        checkInDate:
          type: string
          nullable: true
          format: date
          description: Check-in date (YYYY-MM-DD). Must fall within the trip's start/end dates.
          example: "2026-07-04"
        checkOutDate:
          type: string
          nullable: true
          format: date
          description: Check-out date (YYYY-MM-DD). Must be ≥ checkInDate and ≤ trip end date.
          example: "2026-07-08"
        # --- Flight-specific fields (present when subtype = "flight") ---
        flightNumber:
          type: string
          nullable: true
          example: BA2490
        airline:
          type: string
          nullable: true
          example: British Airways
        departureAirport:
          type: string
          nullable: true
          example: LHR
        arrivalAirport:
          type: string
          nullable: true
          example: CDG
        departureTime:
          type: string
          nullable: true
          description: Full ISO datetime of departure (YYYY-MM-DDTHH:MM).
          example: "2026-07-04T09:15"
        arrivalTime:
          type: string
          nullable: true
          description: Full ISO datetime of arrival (YYYY-MM-DDTHH:MM). May be next day for overnight flights.
          example: "2026-07-04T11:45"
        gate:
          type: string
          nullable: true
          example: B22
        seat:
          type: string
          nullable: true
          example: 14A

    AttractionInput:
      type: object
      required:
        - name
        - country
        - city
      properties:
        name:
          type: string
        country:
          type: string
        city:
          type: string
        coordinates:
          type: object
          nullable: true
          properties:
            lat: { type: number }
            lng: { type: number }
        types:
          type: array
          items: { type: string }
        durationValue:
          type: string
        durationUnit:
          type: string
          enum: [minutes, hours]
        price:
          type: number
          nullable: true
        currency:
          type: string
          default: USD
          description: ISO 4217 currency code for the price field.
          example: EUR
        openingHours:
          type: object
        # Subtype fields — include when creating residence, flight, or custom-slot (custom time-slot) entries
        subtype:
          type: string
          enum: [residence, flight, custom-slot]
        residenceType:
          type: string
          enum: [Hotel, Apartment, Hostel, Villa, Other]
        checkInDate:
          type: string
          format: date
        checkOutDate:
          type: string
          format: date
        flightNumber:
          type: string
        airline:
          type: string
        departureAirport:
          type: string
        arrivalAirport:
          type: string
        departureTime:
          type: string
          description: ISO datetime (YYYY-MM-DDTHH:MM)
        arrivalTime:
          type: string
          description: ISO datetime (YYYY-MM-DDTHH:MM)
        gate:
          type: string
        seat:
          type: string
        # Calendar integration — set for flights so the entry appears on the day planner
        plannedDate:
          type: string
          format: date
          description: ISO date (YYYY-MM-DD). Set automatically for flights to the departure date.
        plannedTime:
          type: string
          description: HH:MM start time. Set automatically for flights to the departure time.
        actualDurationValue:
          type: string
          description: Traveler's planned duration. Set automatically for flights (computed from dep→arr times).
          example: "130"
        actualDurationUnit:
          type: string
          enum: [minutes, hours]
          description: Unit for actualDurationValue. Always "minutes" for auto-computed flight durations.

    ReorderInput:
      type: object
      required:
        - attractionIds
      properties:
        attractionIds:
          type: array
          items:
            type: string
          example: ["65f1234567890abcdef123bb", "65f1234567890abcdef123cc"]

    # --- ANALYTICS SCHEMAS ---
    GlobalAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalTrips: { type: integer, example: 1240 }
            totalAttractions: { type: integer, example: 5890 }
            uniqueCitiesCovered: { type: integer, example: 142 }
            uniqueCountriesCovered: { type: integer, example: 38 }
            totalPlatformBudget: { type: number, example: 2450000.00 }
            totalPlatformSpent: { type: number, example: 1850300.50 }
        categoryDistribution:
          type: array
          items:
            type: object
            properties:
              _id: { type: string, example: Restaurant }
              count: { type: integer, example: 2100 }
        topUsers:
          type: array
          items:
            type: object
            properties:
              ownerId: { type: string, example: 65f1234567890abcdef12345 }
              attractionsCount: { type: integer, example: 145 }
              countriesCount: { type: integer, example: 12 }

    PersonalAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalTrips: { type: integer, example: 14 }
            totalAttractions: { type: integer, example: 42 }
            uniqueCitiesCovered: { type: integer, example: 9 }
            uniqueCountriesCovered: { type: integer, example: 3 }
            totalPersonalBudget: { type: number, example: 8500.00 }
            totalPersonalSpent: { type: number, example: 4120.50 }
        categoryDistribution:
          type: array
          items:
            type: object
            properties:
              _id: { type: string, example: Restaurant }
              count: { type: integer, example: 18 }

    AttractionType:
      type: object
      description: An attraction type with its category data populated
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: Restaurant
        categoryId:
          type: string
          nullable: true
          description: ID of the linked AttractionCategory (null for unmigrated legacy types)
          example: 65f1234567890abcdef12346
        category:
          type: string
          description: Category name (populated from the linked category)
          example: Food & Drink
        icon:
          type: string
          description: Lucide icon name for the type chip
          example: Utensils
        categoryIcon:
          type: string
          description: Lucide icon name for the category header (from linked category)
          example: UtensilsCrossed
        color:
          type: string
          description: Hex color from the linked category
          example: "#f59e0b"
        subtype:
          type: string
          enum: [flight, residence]
          nullable: true
          description: Distinguishes special types from generic ones
        order:
          type: integer
          example: 0

    AttractionTypeInput:
      type: object
      required: [name, categoryId, icon]
      properties:
        name:
          type: string
          example: Restaurant
        categoryId:
          type: string
          description: ID of the AttractionCategory this type belongs to
          example: 65f1234567890abcdef12346
        icon:
          type: string
          example: Utensils
        subtype:
          type: string
          enum: [flight, residence]
          nullable: true
        order:
          type: integer
          example: 0

    AttractionCategory:
      type: object
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: Food & Drink
        icon:
          type: string
          description: Lucide icon name for the category header
          example: UtensilsCrossed
        color:
          type: string
          description: Hex color shared by all types in this category
          example: "#f59e0b"
        order:
          type: integer
          example: 0

    AttractionCategoryInput:
      type: object
      required: [name, icon, color]
      properties:
        name:
          type: string
          example: Food & Drink
        icon:
          type: string
          example: UtensilsCrossed
        color:
          type: string
          example: "#f59e0b"
        order:
          type: integer
          example: 0

    MoodTag:
      type: object
      properties:
        _id:
          type: string
          example: 65f1234567890abcdef12345
        name:
          type: string
          example: Adventure
        icon:
          type: string
          example: Mountain
        color:
          type: string
          example: "#ea580c"
        bgColor:
          type: string
          example: "#fff7ed"
        darkColor:
          type: string
          example: "#fdba74"
        darkBgColor:
          type: string
          example: "#431407"
        order:
          type: integer
          example: 2

    MoodTagInput:
      type: object
      required: [name, icon, color, bgColor, darkColor, darkBgColor]
      properties:
        name:
          type: string
          example: Adventure
        icon:
          type: string
          example: Mountain
        color:
          type: string
          example: "#ea580c"
        bgColor:
          type: string
          example: "#fff7ed"
        darkColor:
          type: string
          example: "#fdba74"
        darkBgColor:
          type: string
          example: "#431407"
        order:
          type: integer
          example: 2

security:
  - BearerAuth: []

paths:
  paths:
  # ==========================================
  # 🔐 Authentication & User Management
  # ==========================================
  /api/auth/register:
    post:
      summary: Create a new user account
      tags: [Authentication]
      security: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        400:
          description: Invalid input / email already exists

  /api/auth/login:
    post:
      summary: Authenticate user and return a JWT token
      tags: [Authentication]
      security: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginInput'
      responses:
        200:
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        401:
          description: Invalid credentials

  /api/users/search:
    get:
      summary: Search registered users by name or email
      description: Returns up to 10 users matching the query. Excludes the authenticated caller. Requires at least 2 characters.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term matched against name and email (case-insensitive)
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
        "401":
          description: Unauthorized

  /api/users/me:
    get:
      summary: Fetch the authenticated user's profile details
      tags: [Authentication]
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        401:
          description: Unauthorized
    put:
      summary: Update profile info
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateInput'
      responses:
        200:
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /api/fx:
    get:
      summary: Get live exchange rate between two currencies
      tags: [Utilities]
      security: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            default: USD
          description: Source currency code (e.g. USD, EUR, JPY). Defaults to USD.
        - name: to
          in: query
          required: false
          schema:
            type: string
            default: ILS
          description: Target currency code (e.g. ILS, EUR, GBP). Defaults to ILS.
      responses:
        200:
          description: Exchange rate from `from` to `to`
          content:
            application/json:
              schema:
                type: object
                properties:
                  rate: { type: number, example: 3.72 }
        404:
          description: No rate available for the given currency pair
        502:
          description: Upstream exchange rate service unavailable

  /api/users/me/password:
    patch:
      summary: Change the authenticated user's password
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  description: The user's existing password for verification
                newPassword:
                  type: string
                  minLength: 8
                  description: The new password (minimum 8 characters)
      responses:
        200:
          description: Password updated successfully
        400:
          description: Missing fields or new password too short
        401:
          description: Unauthorized or current password incorrect

  # ==========================================
  # 🗺️ Trip Management
  # ==========================================
  /api/trips:
    get:
      summary: Retrieve all trips for the logged-in user (owned + shared as collaborator)
      tags: [Trips]
      parameters:
        - name: upcoming
          in: query
          schema:
            type: boolean
          description: Filter where startDate > today
        - name: country
          in: query
          schema:
            type: string
          description: Filter by country name
        - name: mood
          in: query
          schema:
            type: string
          description: Filter by trip mood tags
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
    post:
      summary: Create a new trip
      tags: [Trips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      responses:
        201:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'

  /api/trips/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a specific trip's details
      description: |
        Auth is optional. Public trips are readable without a token.
        If the trip exists but is private and the caller is neither the owner nor a collaborator, returns 403.
        Returns 404 only when the trip ID does not exist at all.
      tags: [Trips]
      security: []
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        403:
          description: Trip is private and caller is not the owner or a collaborator
        404:
          description: Trip not found
    put:
      summary: Update trip details (owner or collaborator; isPrivate settable by either)
      tags: [Trips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
    delete:
      summary: Delete a trip
      tags: [Trips]
      responses:
        200:
          description: Trip successfully deleted

  /api/trips/{id}/expenses:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Replace the full expenses list for a trip (owner or collaborator)
      tags: [Trips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expenses]
              properties:
                expenses:
                  type: array
                  items:
                    type: object
                    required: [label, amount]
                    properties:
                      label:        { type: string }
                      amount:       { type: number, minimum: 0 }
                      attractionId: { type: string, description: Set when derived from a trip attraction }
      responses:
        200:
          description: Updated trip including the new expenses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        400:
          description: Validation error (missing label, negative amount, etc.)
        404:
          description: Trip not found or caller lacks access

  /api/trips/{id}/collaborators:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Add a collaborator to a trip (owner only)
      tags: [Trips]
      description: Looks up the user by email and appends them to the trip's collaborators list. Returns the updated Trip.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: jane@example.com
      responses:
        201:
          description: Collaborator added; returns updated trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        400:
          description: Missing email or trying to add yourself
        404:
          description: Trip not found or user with that email not found
        409:
          description: User is already a collaborator

  /api/trips/{id}/collaborators/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: userId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Remove a collaborator from a trip (owner only)
      tags: [Trips]
      description: Removes the collaborator identified by userId from the trip. Returns the updated Trip.
      responses:
        200:
          description: Collaborator removed; returns updated trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        404:
          description: Trip not found or collaborator not found

  # ==========================================
  # 🏛️ Attraction Management (Nested Routes)
  # ==========================================
  /api/trips/{tripId}/attractions:
    parameters:
      - name: tripId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get all attractions for a specific trip
      description: Auth is optional. Returns attractions for public trips without a token; private trips return [].
      tags: [Attractions]
      security: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
          description: Filter by type (e.g. Restaurant)
        - name: sort
          in: query
          schema:
            type: string
          description: Sort field (e.g. price)
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attraction'
    post:
      summary: Add a new attraction to a trip
      tags: [Attractions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionInput'
      responses:
        201:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'

  /api/attractions:
    get:
      summary: Search public attractions by country or city
      tags: [Attractions]
      security: []
      parameters:
        - name: country
          in: query
          required: false
          schema:
            type: string
          description: Filter by country. Either country or city is required.
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Filter by city. Either country or city is required. Returns up to 100 results.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Text search on attraction name (case-insensitive regex).
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by attraction type name.
      responses:
        '200':
          description: Array of matching attractions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attraction'
        '400':
          description: Missing required params (country or city)
        '500':
          description: Internal server error
    post:
      summary: Create a new attraction globally
      tags: [Attractions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionInput'
      responses:
        '201':
          description: Created attraction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
        '400':
          description: Missing required fields
        '409':
          description: Attraction with this name already exists

  /api/attractions/cities:
    get:
      summary: List cities that have public attractions with coordinates
      tags: [Attractions]
      security: []
      responses:
        '200':
          description: City list with centroid coordinates and attraction counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  cities:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Budapest
                        country:
                          type: string
                          example: Hungary
                        lat:
                          type: number
                          example: 47.4979
                        lng:
                          type: number
                          example: 19.0402
                        count:
                          type: integer
                          example: 12
        '500':
          description: Internal server error

  /api/attractions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Update an attraction's specific details
      tags: [Attractions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionInput'
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'
    delete:
      summary: Delete an attraction globally
      tags: [Attractions]
      responses:
        200:
          description: Attraction deleted

  /api/trips/{tripId}/attractions/{attractionId}:
    parameters:
      - name: tripId
        in: path
        required: true
        schema:
          type: string
      - name: attractionId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Unlink attraction from this trip (does NOT delete the global Attraction document)
      tags: [Attractions]
      responses:
        200:
          description: Removed from itinerary
    patch:
      summary: Update trip-specific schedule for one attraction (plannedDate, plannedTime, actualDuration)
      tags: [Attractions]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionSchedule'
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attraction'

  /api/trips/{tripId}/reorder-attractions:
    parameters:
      - name: tripId
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Reorders attractions within a trip
      tags: [Attractions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderInput'
      responses:
        200:
          description: Order updated successfully

  # ==========================================
  # 🌍 Explore
  # ==========================================
  /api/explore:
    get:
      summary: Discover public trips for the Explore page
      description: |
        Returns up to 24 public trips that have a cover image, sorted by most recent.
        Private trips are never included — no authentication is required or accepted.
      tags: [Explore]
      security: []
      responses:
        200:
          description: List of explore items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: 65f1234567890abcdef123aa
                    destination:
                      type: string
                      example: Summer in Rome
                    coverImage:
                      type: string
                      example: https://images.unsplash.com/photo-xxx
                    tag:
                      type: string
                      example: Adventure
                    tags:
                      type: array
                      items:
                        type: string
                      example: ["Adventure", "Food & Wine"]
                    user:
                      type: string
                      description: First 8 characters of the owner's userId
                      example: 65f12345
                    likes:
                      type: integer
                      description: Number of attractions in the trip
                      example: 5
                    cities:
                      type: array
                      items:
                        type: string
                      description: Deduplicated, alphabetically sorted city names from the trip's attractions
                      example: ["Florence", "Rome", "Venice"]
        500:
          description: Internal server error

  # ==========================================
  # 📊 Analytics
  # ==========================================
  /api/analytics/global:
    get:
      summary: Get system-wide global metrics
      tags: [Analytics]
      security: [] 
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalAnalytics'

  /api/analytics/summary:
    get:
      summary: Get personalized user analytics and travel spend summaries
      tags: [Analytics]
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalAnalytics'

  # ==========================================
  # 🔖 Attraction Types
  # ==========================================
  /api/attraction-types:
    get:
      summary: List all attraction types (with populated category data)
      tags: [Attraction Types]
      security: []
      responses:
        200:
          description: Array of attraction types sorted by display order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttractionType'
        500:
          description: Internal server error
    post:
      summary: Create an attraction type (admin only)
      tags: [Attraction Types]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionTypeInput'
      responses:
        201:
          description: Created attraction type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttractionType'
        400:
          description: Validation error or duplicate name
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only

  /api/attraction-types/{id}:
    put:
      summary: Update an attraction type (admin only)
      tags: [Attraction Types]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttractionTypeInput'
      responses:
        200:
          description: Updated attraction type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttractionType'
        400:
          description: Validation error or duplicate name
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only
        404:
          description: Attraction type not found
    delete:
      summary: Delete an attraction type (admin only)
      tags: [Attraction Types]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Deletion confirmed; type also removed from all attractions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        401:
          description: Unauthorized
        403:
          description: Forbidden — admin only
        404:
          description: Attraction type not found

  # ==========================================
